services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: purplehack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/purplehack
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    # Без bind-mount: на внешних дисках Docker Desktop иногда падает (mkdir … file exists).
    # Для hot-reload с хоста запускай uvicorn локально или добавь override: volumes: [.:/app]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      api:
        condition: service_healthy
    env_file: .env
    environment:
      BACKEND_URL: http://api:8000
    restart: unless-stopped

volumes:
  pg_data:
